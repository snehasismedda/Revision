services:
  revision-postgres:
    image: postgres:16
    container_name: revision-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5432:5432'
    volumes:
      - ./.database/postgres:/var/lib/postgresql/data

  # Automated backup service: runs every 6 hours and saves snapshots to ./.database/backups
  revision-db-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: revision-db-backup
    depends_on:
      - revision-postgres
    environment:
      - POSTGRES_HOST=revision-postgres
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - SCHEDULE=@every 6h
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
      - HEALTHCHECK_PORT=8080
    volumes:
      - ./.database/backups:/backups

