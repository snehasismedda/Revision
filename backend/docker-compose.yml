services:
  revision-qdrant:
    image: qdrant/qdrant:latest
    container_name: revision-qdrant
    ports:
      - '6333:6333'
    volumes:
      - revision_ai_qdrant:/qdrant/storage

  revision-postgres:
    image: postgres:16
    container_name: revision-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5432:5432'
    volumes:
      - revision_ai_postgres:/var/lib/postgresql/data

  revision-redis:
    image: redis:7-alpine
    container_name: revision-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - revision_ai_redis:/data

volumes:
  revision_ai_qdrant:
  revision_ai_postgres:
  revision_ai_redis:
